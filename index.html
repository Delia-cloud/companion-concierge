<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'DM Sans',sans-serif;background:#FAF9F7;color:#2C2C2C;-webkit-font-smoothing:antialiased;overflow-x:hidden;height:100%}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px}
button{font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent}
.app{max-width:480px;margin:0 auto;background:#FAF9F7;min-height:100vh;position:relative}
.header{background:linear-gradient(135deg,#F5A623 0%,#E8960A 100%);padding:14px 16px 12px;position:sticky;top:0;z-index:100}
.header-inner{display:flex;align-items:center;gap:8px}
.header-icon{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:18px}
.header-title{font-size:15px;font-weight:700;color:#fff}
.header-sub{font-size:10px;color:rgba(255,255,255,0.8)}
.content{padding:16px;padding-bottom:100px}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #E8E6E3;display:flex;padding:6px 0 max(8px,env(safe-area-inset-bottom));z-index:100}
.nav-btn{flex:1;background:none;border:none;cursor:pointer;padding:6px 0;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-icon{font-size:20px;transition:opacity 0.15s}
.nav-label{font-size:10px;font-weight:500;color:#999;transition:all 0.15s}
.nav-btn.active .nav-icon{opacity:1}
.nav-btn:not(.active) .nav-icon{opacity:0.5}
.nav-btn.active .nav-label{font-weight:700;color:#F5A623}
.section-label{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.card{background:#fff;border-radius:14px;border:1px solid #EBE9E6;margin-bottom:10px;overflow:hidden;transition:all 0.2s;cursor:pointer}
.card:active{transform:scale(0.99)}
.card.expanded{box-shadow:0 4px 20px rgba(0,0,0,0.08)}
.badge{color:#fff;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:600;white-space:nowrap}
.chip{padding:5px 9px;border-radius:20px;border:1px solid #E0E0E0;background:#fff;cursor:pointer;font-size:11px;font-weight:500;color:#666;white-space:nowrap;transition:all 0.15s;font-family:'DM Sans',sans-serif}
.chip.active{border:2px solid #F5A623;background:#FFF8ED;color:#E8960A;font-weight:600}
.knowhow-box{font-size:12px;color:#555;line-height:1.5;background:#FFF8ED;padding:10px;border-radius:8px}
.prompt-box{font-size:13px;color:#333;font-style:italic;line-height:1.5;background:#EBF5FB;padding:10px;border-radius:8px}
.insight-box{background:#FFF8ED;border-radius:10px;padding:12px;border:1px solid #F5D89A}
.circle-num{width:36px;height:36px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.circle-num-sm{width:24px;height:24px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.progress-bar{display:flex;gap:3px;margin-bottom:16px}
.progress-seg{flex:1;height:4px;border-radius:2px;transition:background 0.3s}
.convo-option{padding:12px 14px;border-radius:10px;border:1px solid #E0E0E0;background:#FAFAFA;cursor:pointer;text-align:left;font-size:13px;color:#555;transition:all 0.15s;font-family:'DM Sans',sans-serif;width:100%;display:block}
.convo-option.selected{border:2px solid #F5A623;background:#FFF8ED;color:#E8960A;font-weight:600}
.btn-primary{padding:14px;border-radius:12px;background:#F5A623;color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-secondary{padding:14px;border-radius:12px;background:#fff;border:1px solid #E0E0E0;font-size:14px;font-weight:600;cursor:pointer;color:#666;font-family:'DM Sans',sans-serif}
.indicator-line{font-size:12px;color:#555;line-height:1.5;padding:3px 0 3px 12px}
@media(max-width:480px){.app{max-width:100%}.nav{max-width:100%}}
</style>

{id:1,name:"Making Connections",short:"Connections",color:"#4CAF50",tagline:"Staying connected and involved",quote:"I don\u2019t go out as much as I used to \u2014 I can feel my world shrinking.",summary:"A space for people experiencing loneliness or a shrinking world. This stage is crucial: intentional choices can keep life full, active, and connected.",whoIsHere:["Natural changes of ageing affecting independence","Mobility or sensory changes","Memory lapses, no longer driving","Bereavement or shrinking income","Going out less, giving up activities"],emotionalIndicators:["Feeling lonely, even if you wouldn\u2019t use that word","World quietly getting smaller","Going out less / giving things up","Diminishing confidence socially","Worried about \u2018keeping up\u2019","Proud of managing alone \u2014 but missing company","Slightly unsure about the future"]},
{id:2,name:"Something\u2019s Changing",short:"Changing",color:"#FF9800",tagline:"When things don\u2019t feel quite right",quote:"Something feels different, but I can\u2019t quite name it.",summary:"A space for members who feel things don\u2019t feel quite right. Done out of love, pride, or fear \u2014 but it can leave both people feeling emotionally alone.",whoIsHere:["Subtle changes can no longer be brushed aside","Memory slips, confusion in familiar places","Irritability or a gut feeling something\u2019s wrong","Protective of each other, compensating so others don\u2019t notice","Aware changes are happening but struggling to get others to see it","Fear of what the future holds, adjusting to a new reality"],emotionalIndicators:["A growing sense of unease that something is wrong","Subtle personality changes (sometimes not in a good way)","Denial from partner/parent or from yourself","Frustration that others don\u2019t see what you see","Unease about unusual decisions or behaviour","Feeling shut out, powerless or dismissed","Lonely, even when sitting next to each other"]},
{id:3,name:"Keeping Normal",short:"Normal",color:"#2196F3",tagline:"Holding onto routines and \u2018us\u2019",quote:"Life is still good, we just have to work harder to keep it that way.",summary:"A space when independence still largely exists but your \u2018normal\u2019 is changing and you are adapting to protect it. Life still feels \u2018normal,\u2019 but it takes more effort \u2014 and there\u2019s a sense this won\u2019t last forever.",whoIsHere:["Often follows a diagnosis","Determined to keep things as normal as possible","Independence largely remains \u2014 still driving, managing activities","Living day by day, holding tightly to routines and relationships","Staying active, seeing friends, taking holidays","Wanting to stay \u2018husband and wife\u2019 not \u2018carer and patient\u2019"],emotionalIndicators:["Proud of coping","Adjusting expectations quietly","Sadness beneath the surface","Working harder to keep life feeling ordinary","Anxious about what the future might bring","Wanting clarity but not fear-based messages"],realInsights:{title:"From a recent Keeping Normal Circle",insights:["Members shared how their husbands living with dementia often lacked empathy when they were feeling fatigued or in pain \u2014 all members could identify with this","Importance of husbands remaining as independent as possible \u2014 whether driving or going out for a walk alone","Members shared experiences of research trials \u2014 the process, selection, and expectations","Practical knowledge sharing about driving assessments was immediately useful for a member whose husband faces one next week","Members found it difficult at times to remain patient and to take time for themselves","Members were deeply appreciative of having the space to talk openly to others who understood"]}},
{id:4,name:"Keeping Going",short:"Going",color:"#E91E63",tagline:"When support helps you carry on",quote:"I\u2019m coping, but it\u2019s costing me more than I expected.",summary:"A space where independence is still possible, but support becomes essential. Without support, the risk of a crisis grows.",whoIsHere:["Independence is possible, but not without help","Partner or adult child begins to feel like a carer, not spouse","Emotional and physical fatigue building","Disrupted sleep, repetition, agitation","Time away may shrink to hours\u2026 or disappear completely"],emotionalIndicators:["Exhausted and overwhelmed","Strong and committed","Guilt about feeling frustrated","Fear of reaching breaking point","Exasperation and anger","Anxiety about losing personal health"]},
{id:5,name:"Together Apart",short:"Apart",color:"#9C27B0",tagline:"Life in different postcodes",quote:"I\u2019ve let go of one role, but I\u2019m not sure who I am now.",summary:"A space for navigating the emotional complexity if a partner moves into residential care. The work of this stage is rebuilding: new rhythms, managing visits, slowly reconnecting with your identity.",whoIsHere:["Partner/parent has moved into residential care","Practical pressure eases, emotional toll rises","Missing the routines built over decades","Determined to ensure good care","No longer primary caregiver, unsure where they fit","Financial pressure of paying up to \u00a38,000 a month"],emotionalIndicators:["Guilt about not being able to cope at home","Sometimes \u2018sheer relief\u2019 when daily responsibility ends","Loneliness and emptiness of being at home alone","Loyalty mixed with resentment","Frustration at the system, feeling out of control","Fear of running out of money"]},
{id:6,name:"Finding Myself",short:"Finding Me",color:"#009688",tagline:"Rediscovering yourself after caring",quote:"Now you\u2019re looking at your whole future, not just the next few months.",summary:"Rediscovering yourself after caring. A period of painful transition but also possibility. The work is rediscovery.",whoIsHere:["After the death of the person they cared for","Often grieved emotionally long before physical loss","Facing an entirely new landscape \u2014 big life decisions","Learning who you are again","Pressure from others to move on","Rebuilding confidence, rekindling friendships"],emotionalIndicators:["Lonely and hopeful at the same time","Loss of confidence","Curious about\u2026 \u2018what now?\u2019","Proud of surviving","Unsure, but open","Feeling vulnerable and alone"]}
];

const MX={
1:{hobbies:{r:"High",d:"Carers at this stage are often still active but starting to feel the pull of caring responsibilities. They may be giving up hobbies without realising it. This is a prevention window.",k:"Local hobby clubs and classes, Good Company Clubs schedule, tips on maintaining personal interests alongside caring, community activity finder.",p:"What hobbies did you used to enjoy that you\u2019ve had less time for? Would you be interested in a Club where your partner can come too?"},similar:{r:"Medium",d:"They may not yet identify as a \u2018carer\u2019 and may resist the label. Peer connection works best when framed around shared interests rather than shared diagnosis.",k:"Carer Circles overview, stories from members who joined early, introductions to other members at Clubs.",p:"Do you know other people who are going through something similar? Would it help to meet others who understand?"},emotional:{r:"Medium",d:"Feelings may be subtle \u2014 a vague sense that life is narrowing, low-level worry. They may not yet recognise the emotional load.",k:"Listening ear approach, when to signpost to Dementia Carers Count or Health in Mind, normalising early emotions.",p:"How are you feeling about things at the moment? Is anything keeping you up at night?"},dementia:{r:"Medium\u2013High",d:"If a diagnosis is recent or suspected, there\u2019s a hunger for information but also overwhelm. Bite-sized, relatable content works best.",k:"Good Company dementia blogs, DISC/RSM/DCC training info, \u2018What is dementia?\u2019 one-pager, understanding early signs.",p:"Is there anything about the diagnosis that you\u2019d like to understand better?"},navigate:{r:"Low\u2013Medium",d:"May not yet need intensive system navigation but could benefit from knowing what\u2019s available before a crisis.",k:"Overview of health and social care system, \u2018What to expect\u2019 guide, dementia support worker role explained.",p:"Do you know who to contact if you need extra support? Have you been offered a carers assessment?"},independent:{r:"Low",d:"Less relevant at this stage, though they may be thinking ahead about the home environment.",k:"Home safety basics, fire safety visits, technology overview.",p:"Are there any practical things at home that are becoming more difficult?"},financial:{r:"Medium",d:"Key early-action window. LPAs and financial planning are much easier to set up now than later.",k:"LPA guidance, Attendance Allowance info, wills and estate planning signposting, Council Tax reduction.",p:"Have you thought about things like Lasting Power of Attorney? It\u2019s much easier to sort out now while things are calmer."},break_:{r:"Low\u2013Medium",d:"They may not feel they need a break yet, or may feel guilty about wanting one. Normalising breaks early is preventive.",k:"Specialist Hosting overview, Association of Carers free respite, personal assistants info.",p:"Do you ever get time to yourself? What would you do with a free morning each week?"},mobility:{r:"Low\u2013Medium",d:"Their own health may be taking a back seat. Gentle prompts about staying active are valuable.",k:"Local walking groups, exercise classes, NHS health check reminders.",p:"Are you managing to stay active yourself? Sometimes carers put their own health second."},experience:{r:"Medium",d:"Some early-stage carers are keen to contribute and find purpose.",k:"LEAP panel information, Know-How Champions role, volunteering opportunities.",p:"You\u2019ve clearly learned a lot already. Would you ever want to share that with others?"},relative:{r:"Medium\u2013High",d:"Long-distance carers are often in this state \u2014 worried but not yet in crisis.",k:"Remote caring tips, technology for monitoring, coordination with local services, how to have difficult conversations.",p:"How do you keep an eye on things when you\u2019re not there? What worries you most?"},connect:{r:"High",d:"Building trust and establishing the relationship is essential. Regular, light-touch contact.",k:"Welcome call scripts, new member engagement tips, newsletter sign-up, event invitations.",p:"I\u2019m your Concierge \u2014 think of me as someone who\u2019s here whenever you need us."}},
2:{hobbies:{r:"Medium",d:"Carers may be withdrawing from social activities as changes at home demand more attention.",k:"Clubs where carers can bring the person they support, hobby-based Circles, flexible attendance.",p:"Are you still managing to do the things you enjoy? What\u2019s getting harder to fit in?"},similar:{r:"High",d:"Isolation often accelerates. Carers feel alone with changes they can\u2019t fully explain to others.",k:"Carer Circles matched by stage, peer introductions, stories of other members at this stage.",p:"Do you feel like other people understand what\u2019s happening? Would it help to talk to someone who\u2019s been through it?"},emotional:{r:"High",d:"Anxiety, grief, confusion, and denial often coexist. The relationship is shifting. Feeling shut out, powerless or dismissed.",k:"Active listening techniques, counselling referral, Dementia Carers Count programme, normalising ambiguous grief.",p:"How are you coping with the changes? It\u2019s okay to feel a lot of different things at once."},dementia:{r:"High",d:"Changes are harder to ignore. Practical strategies for specific behaviours and symptoms are needed.",k:"Behaviour-specific guides (sundowning, repetition, confusion), communication tips, DISC/RSM training.",p:"What changes are you noticing? Are there particular moments or behaviours that are hardest to deal with?"},navigate:{r:"Medium\u2013High",d:"May be dealing with GP appointments, memory clinics, or trying to get a formal assessment.",k:"How to request a carers assessment, what happens at a memory clinic, how to talk to the GP.",p:"Are you getting the support you need from the GP? Do you know about carers assessments?"},independent:{r:"Medium",d:"Home adaptations may be becoming relevant \u2014 safety concerns, wandering, falls risk.",k:"Home safety assessment info, stairlift and adaptation signposting, technology and trackers.",p:"Is the home still working well for you both? Any safety concerns?"},financial:{r:"High",d:"Urgent if LPAs are not yet in place. Attendance Allowance and other benefits become relevant.",k:"LPA urgency messaging, Attendance Allowance application guide, CHC funding basics, Council Tax reduction.",p:"Have you got Lasting Power of Attorney sorted? Are you claiming everything you\u2019re entitled to?"},break_:{r:"Medium\u2013High",d:"The caring load is increasing. Breaks are harder to take but more necessary.",k:"Specialist Hosting service, respite options, Association of Carers, day care options.",p:"When was the last time you had proper time to yourself?"},mobility:{r:"Medium",d:"Carer health often declines as the load increases.",k:"Carer health check reminder, local exercise options, stress management tips.",p:"Are you looking after your own health too? Have you seen your GP recently?"},experience:{r:"Low\u2013Medium",d:"May feel too overwhelmed to give back right now.",k:"Low-commitment ways to contribute, sharing tips at Circles.",p:"No pressure, but if there\u2019s anything you\u2019ve found that works, we\u2019d love to share it."},relative:{r:"High",d:"Long-distance carers are often most distressed at this stage.",k:"Coordinating local support, technology for remote monitoring, having conversations about increasing support.",p:"How are you managing from a distance? What would make the biggest difference?"},connect:{r:"High",d:"More frequent check-ins needed. Building deeper trust as complexity increases.",k:"Proactive check-in schedule, no-show follow-up protocols, sensitive communication tips.",p:"I\u2019m going to check in with you a bit more regularly if that\u2019s okay."}},
3:{hobbies:{r:"High",d:"Carers are fighting to maintain their identity beyond the carer role. Clubs and hobbies are a vital anchor to normality.",k:"Clubs where couples can attend together, hobby-matching, flexible scheduling. Activities where both can participate.",p:"What does a \u2018normal\u2019 week look like for you? What would you like more of?"},similar:{r:"High",d:"Circles need to feel social, not clinical. Members want to stay \u2018husband and wife\u2019 not \u2018carer and patient\u2019. Recognition replaces explanation.",k:"Keeping Normal Circle (monthly, up to 6 members, 90 mins). Introductions to couples at similar stages.",p:"We have a group of people who are all in a similar boat. It\u2019s very relaxed \u2014 no pressure."},emotional:{r:"Medium\u2013High",d:"Proud of coping but adjusting expectations quietly. Sadness beneath the surface. Difficulty remaining patient. Finding it hard when partner lacks empathy for their own fatigue or pain.",k:"Gentle emotional support, normalising the effort of \u2018keeping normal\u2019, professional support signposting. Validation that it\u2019s hard even when things look okay.",p:"Behind keeping things normal, how are you really feeling? It\u2019s okay to say it\u2019s hard even when things look \u2018fine\u2019."},dementia:{r:"Medium\u2013High",d:"They want practical, actionable advice. Interested in research trials, driving assessments, maintaining partner\u2019s independence safely. Want clarity but not fear-based messages.",k:"Tips for adapting daily routines, communication strategies that preserve dignity. Research trial info. Driving assessment guidance.",p:"Are there particular moments in the day that have become tricky? What would help you feel more prepared?"},navigate:{r:"Medium",d:"They may resist engaging the system because it feels like admitting things aren\u2019t normal.",k:"Gentle framing as \u2018keeping things on track\u2019. Planning ahead guide. Carers assessment as \u2018good housekeeping\u2019.",p:"It can help to have things lined up in the background, just in case."},independent:{r:"Medium",d:"Small adaptations that don\u2019t disrupt normality. Partner is still driving and managing activities \u2014 but for how long?",k:"Subtle home adaptations (non-clinical), technology that blends in, member-recommended tradespeople. Driving assessment info.",p:"Are there small things that would make life at home easier without changing everything?"},financial:{r:"Medium\u2013High",d:"Financial pressures may be building. Benefits framed as practical planning, not crisis.",k:"Attendance Allowance as \u2018what you\u2019re entitled to\u2019, budgeting tips, LPA if not done.",p:"Are you claiming everything you\u2019re entitled to? It\u2019s not charity \u2014 it\u2019s yours."},break_:{r:"High",d:"Critical. Carers often don\u2019t take breaks because they feel guilty. They need permission \u2014 framed as good for both.",k:"Specialist Hosting positioned as \u2018your partner gets to enjoy activities too\u2019. Mutual benefit framing. Association of Carers respite.",p:"If your partner was at a Club enjoying themselves for a morning, what would you do with that time?"},mobility:{r:"Medium",d:"Physical health maintenance important. Members spoke about their own fatigue and injuries going unacknowledged.",k:"Carer-specific exercise options, walking clubs, health MOT reminders. Self-care as maintenance not luxury.",p:"Keeping yourself well is part of keeping things normal. Are you finding time to look after yourself?"},experience:{r:"Medium",d:"Giving back reinforces identity as capable \u2014 not just a carer. Members actively share practical knowledge in Circles.",k:"LEAP involvement, sharing tips at Circles, contributing to know-how library.",p:"You\u2019ve figured out so many ways to keep life going. Would you share those tips?"},relative:{r:"Medium",d:"Relevant for those supporting from a distance who want to help maintain normality.",k:"Remote support strategies, coordinating with local services, technology.",p:"How do you help keep things feeling normal when you\u2019re not there every day?"},connect:{r:"High",d:"Consistent, reliable relationship. Monthly Circle attendance is the anchor.",k:"Regular but light-touch check-ins, remembering personal details, milestone acknowledgement.",p:"Just checking in \u2014 how\u2019s the week been? How was the Circle?"}},
4:{hobbies:{r:"Medium",d:"Hobbies may have fallen away. Reintroducing them, even adapted, can be restorative.",k:"Adapted hobby options, Clubs with extra support, Specialist Hosting to enable attendance.",p:"I know things are tough, but is there anything you miss doing? Even something small?"},similar:{r:"High",d:"Peer support is critical. They need people who truly understand sustained caring \u2014 exhaustion, disrupted sleep, repetition, agitation.",k:"Keeping Going Circle (with Specialist Host for partner). Targeted peer introductions.",p:"Being around people who genuinely get it can make a real difference. Our Keeping Going Circle has a Host for your partner too."},emotional:{r:"Very High",d:"Exhausted and overwhelmed but strong and committed. Guilt about feeling frustrated. Fear of reaching breaking point.",k:"Burnout recognition checklist, professional counselling, Dementia Carers Count, crisis support.",p:"You\u2019re carrying a lot. How are you actually doing? Please be honest with me."},dementia:{r:"High",d:"Behaviours may be more challenging \u2014 disrupted sleep, repetition, agitation.",k:"Managing challenging behaviours, night-time disturbance tips, personal care guidance, continence support.",p:"What\u2019s the hardest thing to deal with right now, day to day?"},navigate:{r:"Very High",d:"Likely dealing with multiple agencies, assessments, reviews. The system is complex and exhausting.",k:"CHC funding guide, carers assessment refresh, advocacy services, how to challenge decisions.",p:"How are you finding dealing with the council, the NHS? Do you need someone to help navigate it?"},independent:{r:"High",d:"Home may need significant adaptation. Questions about whether home is still viable.",k:"Major home adaptations, assistive technology, night-time support, environmental risk assessment.",p:"Is the home still working? Are there safety concerns you\u2019re managing alone?"},financial:{r:"High",d:"Financial strain often peaks here. CHC, benefits reviews,
